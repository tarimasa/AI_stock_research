name: Daily Stock AI Report

on:
  schedule:
    # GitHub Actions はスケジュール通りに起動する保証がなく、混雑時に30分〜2時間遅延することがある。
    # ユーザーの発注可能窓: 7:00〜9:00 JST（朝）と 12:00〜13:00 JST（昼）の2回。
    - cron: '30 21 * * 0-4'   # 06:30 JST / 朝:9:00 前場寄付向け（目標着信 7:00〜8:30）
    - cron: '45 2 * * 1-5'    # 11:45 JST / 昼:12:30 後場寄付向け（目標着信 12:00〜12:30、前場引け後）
  workflow_dispatch:           # 手動実行も可能
    inputs:
      session:
        description: 'Session (morning or noon)'
        required: false
        default: 'morning'
        type: choice
        options:
          - morning
          - noon

concurrency:
  group: daily-stock-report-${{ github.event.schedule || inputs.session || 'default' }}
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'              # Layer 5 / 5-10: pip キャッシュで依存関係インストールを高速化

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── J-Quants 認証設定 ───────────────────────────────────────────────────
      # jquants-api-client（Python ライブラリ）は JQUANTS_API_KEY 環境変数を直接読む。
      # CLI バイナリを使う場合のみ下記 credentials.json が必要。
      - name: Configure J-Quants credentials (for CLI, if used)
        run: |
          mkdir -p ~/.config/jquants
          printf '{"api_key":"%s"}\n' "$JQUANTS_API_KEY" > ~/.config/jquants/credentials.json
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

      # ── bulk CSV ダウンロード (Phase 3 / Layer 5 最適化) ─────────────────────
      # FULL_SCAN_ENABLED=true のときだけ実行。
      # get_eq_bars_daily(date_yyyymmdd=...) で1日ずつ取得（レート制限対策）。
      # 直近90営業日分を取得し、既存CSVに追記する。
      - name: Download bulk historical data (full scan mode only)
        if: ${{ vars.FULL_SCAN_ENABLED == 'true' }}
        run: |
          python - <<'EOF'
          import os, sys, time
          sys.path.insert(0, "src")

          from datetime import datetime, timedelta, date as date_cls
          from pathlib import Path
          import pandas as pd
          import jquantsapi

          api_key = os.environ.get("JQUANTS_API_KEY", "")
          if not api_key:
              print("JQUANTS_API_KEY が設定されていません。スキップ。")
              sys.exit(0)

          client = jquantsapi.ClientV2(api_key=api_key)
          bulk_dir = Path("data/bulk")
          bulk_dir.mkdir(parents=True, exist_ok=True)

          # JQuants Lightプランの短縮カラム名 → 標準名に変換
          def normalize_cols(df):
              col_lower = {c.lower(): c for c in df.columns}
              mapping = {
                  "Open":   ["adjo","adjustmentopen","open","o"],
                  "High":   ["adjh","adjustmenthigh","high","h"],
                  "Low":    ["adjl","adjustmentlow","low","l"],
                  "Close":  ["adjc","adjustmentclose","close","c"],
                  "Volume": ["adjvo","adjustmentvolume","volume","vo"],
              }
              rename = {}
              for dst, candidates in mapping.items():
                  if dst not in df.columns:
                      for src in candidates:
                          if src in col_lower:
                              rename[col_lower[src]] = dst
                              break
              return df.rename(columns=rename) if rename else df

          # 直近90営業日を列挙（土日除外）
          today = date_cls.today()
          business_days = []
          d = today
          while len(business_days) < 90:
              if d.weekday() < 5:
                  business_days.append(d.strftime("%Y%m%d"))
              d -= timedelta(days=1)

          # 既存CSVから取得済み日付を把握
          existing_dates = set()
          for csv_file in bulk_dir.glob("daily_*.csv"):
              try:
                  chunk = pd.read_csv(csv_file, dtype=str, usecols=lambda c: c.lower() in ("date","date_yyyymmdd"))
                  date_col = next((c for c in chunk.columns if "date" in c.lower()), None)
                  if date_col:
                      existing_dates.update(chunk[date_col].str.replace("-","").tolist())
              except Exception:
                  pass
          print(f"既存取得済み日数: {len(existing_dates)}日")

          # 未取得の日付だけダウンロード
          to_fetch = [d for d in business_days if d not in existing_dates]
          print(f"新規取得対象: {len(to_fetch)}日")

          month_frames: dict = {}
          success = 0
          for i, date_str in enumerate(to_fetch):
              try:
                  df = client.get_eq_bars_daily(date_yyyymmdd=date_str)
                  if df is None or df.empty:
                      print(f"  {date_str}: データなし（祝日の可能性）")
                  else:
                      df = normalize_cols(df)
                      month_str = f"{date_str[:4]}-{date_str[4:6]}"
                      if month_str not in month_frames:
                          month_frames[month_str] = []
                      month_frames[month_str].append(df)
                      success += 1
                      if success % 10 == 0:
                          print(f"  進捗: {i+1}/{len(to_fetch)} ({success}日取得)")
              except Exception as e:
                  print(f"  {date_str}: エラー {type(e).__name__}: {str(e)[:80]}")
              time.sleep(0.5)  # レート制限対策: 0.5秒待機

          # 月別CSVに保存（既存データに追記）
          for month_str, frames in month_frames.items():
              csv_path = bulk_dir / f"daily_{month_str}.csv"
              new_df = pd.concat(frames, ignore_index=True)
              if csv_path.exists():
                  existing = pd.read_csv(csv_path, dtype=str)
                  combined = pd.concat([existing, new_df], ignore_index=True)
                  date_col = next((c for c in combined.columns if c.lower()=="date"), "Date")
                  combined = combined.drop_duplicates(subset=[date_col, "Code"] if "Code" in combined.columns else date_col)
                  combined.to_csv(csv_path, index=False)
              else:
                  new_df.to_csv(csv_path, index=False)
              print(f"  保存: {csv_path.name} (+{len(new_df)}行)")

          print(f"ダウンロード完了: {success}/{len(to_fetch)}日取得")
          EOF
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

      # ── セッション決定 ────────────────────────────────────────────
      # cron で起動された場合: schedule 式から morning / noon を判定
      # 手動実行: inputs.session（既定 morning）
      - name: Resolve session
        id: session
        run: |
          if [ "${{ github.event.schedule }}" = "45 2 * * 1-5" ]; then
            echo "value=noon" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.session }}" ]; then
            echo "value=${{ inputs.session }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=morning" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AI stock report (${{ steps.session.outputs.value }})
        run: python src/main.py ${{ steps.session.outputs.value }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          LIFF_URL: ${{ secrets.LIFF_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DRY_RUN: 'false'
          SESSION: ${{ steps.session.outputs.value }}
          MAX_STOCKS_TO_ANALYZE: '10'
          # フルスキャンモード: GitHub Variables で FULL_SCAN_ENABLED=true に設定して有効化
          FULL_SCAN_ENABLED: ${{ vars.FULL_SCAN_ENABLED || 'false' }}
          # 移行期間中の並行比較: SCAN_COMPARE=true で差分ログを出力
          SCAN_COMPARE: ${{ vars.SCAN_COMPARE || 'false' }}
