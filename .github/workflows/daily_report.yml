name: Daily Stock AI Report

on:
  schedule:
    # GitHub Actions はスケジュール通りに起動する保証がなく、混雑時に30分〜2時間遅延することがある。
    # 8:30〜8:45 頃にLINEを受け取るため、遅延を考慮して 06:30 JST (21:30 UTC) に前倒し設定。
    - cron: '30 21 * * 0-4'   # 06:30 JST（目標: 8:30前後着信）※日〜木 = 月〜金
    - cron: '0 2 * * 1-5'    # 11:00 JST（12:00 発注向け）※月〜金
  workflow_dispatch:           # 手動実行も可能

concurrency:
  group: daily-stock-report
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI stock report
        run: python src/main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          LIFF_URL: ${{ secrets.LIFF_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          DRY_RUN: 'false'
          MAX_STOCKS_TO_ANALYZE: '10'
