name: Deploy LIFF to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/liff/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy LIFF Form
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into app.js
        env:
          LIFF_URL: ${{ secrets.LIFF_URL }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
        run: |
          # LIFF_URL から LIFF_ID を抽出（https://liff.line.me/<ID> の <ID> 部分）
          LIFF_ID="${LIFF_URL#https://liff.line.me/}"
          # app.js のプレースホルダーを実際の値に置換
          sed -i "s|YOUR_LIFF_ID|${LIFF_ID}|g" src/liff/app.js
          sed -i "s|https://YOUR-CONTAINER-APP.japaneast.azurecontainerapps.io|${WEBHOOK_BASE_URL}|g" src/liff/app.js

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/liff   # src/liff/ をデプロイ
          output_location: ""      # ビルド不要（バニラHTML）
