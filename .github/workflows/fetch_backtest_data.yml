name: Fetch Backtest Monthly Data

on:
  workflow_dispatch:
    inputs:
      months:
        description: |
          取得する月を指定（YYYYMM形式）。
            単月: 202604
            範囲: 202105-202409
          省略時は前月を自動取得。
        required: false
        default: ''
      force:
        description: '既存ファイルを上書きする (true/false)'
        required: false
        default: 'false'

concurrency:
  group: fetch-backtest-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 複数月取得時のため余裕を持たせる
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch monthly data from JQuants
        run: |
          MONTHS_ARG=""
          FORCE_ARG=""

          INPUT="${{ github.event.inputs.months }}"
          if [ -n "$INPUT" ]; then
            # 単月(YYYYMM)か範囲(YYYYMM-YYYYMM)かで引数を切り替え
            if [[ "$INPUT" == *"-"* ]]; then
              MONTHS_ARG="--months $INPUT"
            else
              MONTHS_ARG="--month $INPUT"
            fi
          fi

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi

          python backtest/fetch_monthly_data.py $MONTHS_ARG $FORCE_ARG
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

      - name: Check for new/updated parquet files
        id: check_files
        run: |
          git status --short backtest/data/
          COUNT=$(git status --short backtest/data/ | grep '\.parquet' | wc -l)
          echo "changed=$COUNT" >> $GITHUB_OUTPUT
          echo "変更ファイル数: $COUNT"

      - name: Commit and push parquet files
        if: steps.check_files.outputs.changed != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          INPUT="${{ github.event.inputs.months }}"
          if [ -n "$INPUT" ]; then
            LABEL="$INPUT"
          else
            LABEL=$(date -d "$(date +%Y-%m-01) -1 day" +%Y%m)
          fi

          git add backtest/data/daily_*.parquet
          git commit -m "data: JQuants ${LABEL} 月次OHLCVデータを追加"
          git push origin HEAD
