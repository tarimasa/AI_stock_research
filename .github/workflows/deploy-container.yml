name: Deploy Container to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'config/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  IMAGE_NAME: ai-stock-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"
          az acr build \
            --registry "$ACR_NAME" \
            --image "${IMAGE_NAME}:${{ github.sha }}" \
            .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Set ACR registry credentials on Container App
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name "$ACR_NAME" \
            --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" -o tsv)

          az containerapp registry set \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --server "${ACR_NAME}.azurecr.io" \
            --username "$ACR_USERNAME" \
            --password "$ACR_PASSWORD"

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"
