name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Inject secrets into app.js
        env:
          LIFF_URL: ${{ secrets.LIFF_URL }}
          WEBHOOK_BASE_URL: ${{ secrets.WEBHOOK_BASE_URL }}
        run: |
          LIFF_ID="${LIFF_URL#https://liff.line.me/}"
          sed -i "s|YOUR_LIFF_ID|${LIFF_ID}|g" src/liff/app.js
          if [ -n "${WEBHOOK_BASE_URL}" ]; then
            sed -i "s|https://YOUR-CONTAINER-APP.japaneast.azurecontainerapps.io|${WEBHOOK_BASE_URL}|g" src/liff/app.js
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_MUSHROOM_006C0A000 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/liff"
          api_location: ""
          output_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_MUSHROOM_006C0A000 }}
          action: "close"
