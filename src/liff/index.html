<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>保有株フォーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📈 保有株フォーム</h1>
    <hr />

    <form id="portfolioForm">
      <div class="form-group">
        <label for="action">操作</label>
        <select id="action" name="action" required>
          <option value="add">追加</option>
          <option value="remove">削除</option>
          <option value="list">一覧表示</option>
        </select>
      </div>

      <div class="form-group" id="codeGroup">
        <label for="code">銘柄コード（4桁）</label>
        <input
          type="tel"
          id="code"
          name="code"
          pattern="[0-9]{4}"
          placeholder="例: 7203"
          maxlength="4"
        />
        <span class="hint">東証4桁コードを入力してください</span>
      </div>

      <div id="addFields">
        <div class="form-group">
          <label for="shares">株数</label>
          <input
            type="number"
            id="shares"
            name="shares"
            min="1"
            step="1"
            placeholder="例: 100"
          />
        </div>

        <div class="form-group">
          <label for="price">取得単価（円）</label>
          <input
            type="number"
            id="price"
            name="price"
            min="1"
            step="1"
            placeholder="例: 2650"
          />
        </div>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none;"></div>

      <button type="submit" id="submitBtn">✅ 登録する</button>
    </form>

    <div id="successMsg" class="success-msg" style="display:none;">
      ✅ 送信完了しました。LINEトークに戻ります...
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
